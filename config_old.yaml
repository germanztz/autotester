theme: system
app_name: autotester
auto_refresh: true
ia:
  ollama_url: http://localhost:11434
  ollama_model: qwen3.5:0.8b
  chunk_size: 500
  chunk_overlap: 50
  system_prompt: You are a semantic text analyzer. Your task is to group related concepts
    together, maintain the original meaning and flow, and extract key keywords from
    each text chunk.
  user_prompt_tpl: "Analyze the following text chunk. Group related concepts, maintain\
    \ the original meaning and coherence, and extract 3-7 keywords that represent\
    \ the main topics.\r\n\r\nText:\r\n{text}\r\n\r\nReturn ONLY valid JSON with exactly\
    \ these fields (no markdown, no extra text):\r\n{{\"original_text\": \"the semantically\
    \ grouped text\", \"text_keywords\": [\"kw1\", \"kw2\", ...]}}"
logging:
  level: INFO
