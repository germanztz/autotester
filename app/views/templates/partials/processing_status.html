<div id="ai-status-widget" class="card shadow-sm d-none" data-state="idle">
    <div class="card-body" id="ai-status-body">
        <div class="d-flex align-items-center" id="ai-status-running">
            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
            <span id="ai-status-message">Processing PDF... (<span id="ai-status-elapsed">0</span> s)</span>
        </div>
        <div id="ai-status-done" class="d-none">
            <h5 class="card-title mb-2"><i class="bi bi-check-circle text-success"></i> Indexing complete</h5>
            <p class="mb-1"><strong id="ai-summary-project"></strong></p>
            <ul class="list-unstyled small text-muted mb-0">
                <li><i class="bi bi-file-earmark"></i> Pages: <span id="ai-summary-pages">0</span></li>
                <li><i class="bi bi-layers"></i> Chunks indexed: <span id="ai-summary-chunks">0</span></li>
                <li><i class="bi bi-clock"></i> Total time: <span id="ai-summary-duration">0</span> s</li>
            </ul>
        </div>
        <div id="ai-status-error" class="d-none text-danger">
            <i class="bi bi-exclamation-triangle"></i>
            <span id="ai-status-error-msg"></span>
        </div>
    </div>
</div>
