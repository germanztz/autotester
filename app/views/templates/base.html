<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ current_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}autotester{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
    {% include "partials/toasts.html" %}

    <nav class="navbar navbar-expand-lg fixed-top app-navbar">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
                <i class="bi bi-robot"></i> autotester
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('config.show') }}">
                            <i class="bi bi-gear"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="app-shell">
        {% include "partials/sidebar.html" %}
        <main class="app-main">
            <div class="container-fluid py-3">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- ====== HIDDEN UPLOAD FORM ====== -->
    <form method="POST" action="{{ url_for('files.upload') }}" enctype="multipart/form-data" id="uploadForm" style="display:none">
        <input type="file" name="pdf" accept="application/pdf,.pdf" id="pdfFileInput" required>
    </form>

    <div class="modal fade" id="renameModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil"></i> Project options</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form method="POST" id="renameForm">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" name="title" id="renameInput" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Language</label>
                            <input type="text" class="form-control" name="language" id="languageInput" placeholder="e.g. en, es, fr, de...">
                        </div>
                    </form>
                    <hr>
                    <button type="button" class="btn btn-outline-danger btn-sm w-100 reset-progress-btn" data-project="">
                        <i class="bi bi-arrow-counterclockwise"></i> Reset progress
                    </button>
                    <div class="mt-2">
                        <form method="POST" id="deleteForm" class="d-inline w-100"
                              onsubmit="return confirm('Delete this project? All data will be lost.');"
                              action="/files//delete">
                            <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                                <i class="bi bi-trash"></i> Delete project
                            </button>
                        </form>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="renameForm" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sidebar_digest.js') }}"></script>
    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
